# Pre-commit hooks for floe
# Install: uv run pre-commit install --hook-type pre-commit --hook-type pre-push
# Run all: uv run pre-commit run --all-files
# Run pre-push: uv run pre-commit run --hook-stage pre-push --all-files
# See .github/CI.md for CI strategy documentation
#
# Quality Bar Alignment:
# - Pre-commit: Fast checks (<5s) - linting, formatting, secrets, sleep detection
# - Pre-push: CI-aligned validation - lint, format, type, security, tests, traceability

default_language_version:
  python: python3

repos:
  # ==========================================================
  # Pre-commit hooks (fast, run on every commit)
  # ==========================================================

  # Ruff: Fast Python linter and formatter
  # Auto-fixes are applied on pre-commit. Pre-push runs check-only versions.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      # Linting with auto-fix (pre-commit only - fixes are applied automatically)
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
        stages: [pre-commit]

      # Formatting (pre-commit only - auto-formats files)
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]

  # Secret detection with entropy analysis (replaces custom regex)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        stages: [pre-commit]
        exclude: ^(\.sisyphus/|\.claude/skills/|\.claude/reviews/|\.specify/|tests/fixtures/|docs/reference/)

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Trailing whitespace
      - id: trailing-whitespace
        stages: [pre-commit]

      # End of file newline
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: \.omc/

      # YAML syntax (exclude Helm templates - Go template syntax not parseable)
      - id: check-yaml
        stages: [pre-commit]
        args: [--unsafe]  # Allow custom tags
        exclude: ^charts/.*templates/

      # Large files
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=1000]

      # Merge conflict markers
      - id: check-merge-conflict
        stages: [pre-commit]

      # Debug statements
      - id: debug-statements
        stages: [pre-commit]

      # Case conflicts (important for cross-platform)
      - id: check-case-conflict
        stages: [pre-commit]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        stages: [pre-commit]
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|packages/.*/tests/|plugins/.*/tests/|\.claude/|devtools/|testing/)

  # Constitution validation (lightweight - branch naming, quick architecture checks)
  - repo: local
    hooks:
      - id: constitution-check
        name: constitution validation
        entry: scripts/pre-commit-constitution.sh
        language: script
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

      # Hardcoded sleep detection (matches CI check)
      - id: no-hardcoded-sleep
        name: no hardcoded sleep in tests
        entry: scripts/pre-commit-no-sleep.sh
        language: script
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

      # Prevent dbtRunner imports in orchestrator (SC-004)
      - id: no-dbt-runner-in-orchestrator
        name: no dbtRunner in orchestrator
        entry: scripts/pre-commit-no-dbt-runner.sh
        language: script
        stages: [pre-commit]
        pass_filenames: false
        files: ^plugins/floe-orchestrator-dagster/

      # Claude Code agent validation
      - id: agent-lint
        name: claude agent frontmatter
        entry: scripts/pre-commit-agent-lint.sh
        language: script
        stages: [pre-commit]
        pass_filenames: false
        files: ^\.claude/agents/.*\.md$

  # ==========================================================
  # Pre-push hooks (slower, run before push)
  # Uses local hooks to match CI exactly (reads pyproject.toml)
  # ==========================================================

  - repo: local
    hooks:
      # Ruff linting check (matches CI - verify no lint errors before push)
      # Pre-commit auto-fixes, pre-push verifies no issues slip through
      - id: ruff-check
        name: ruff check (lint)
        entry: uv run --no-sync ruff check .
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Ruff formatting check (matches CI - verify format before push)
      # Pre-commit auto-fixes, pre-push verifies no unformatted code slips through
      - id: ruff-format-check
        name: ruff format (check)
        entry: uv run --no-sync ruff format --check .
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Type checking with mypy (matches CI exactly)
      - id: mypy-strict
        name: mypy (strict)
        entry: uv run --no-sync mypy --strict packages/ testing/
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Validate dbt dependency/version contracts (matches CI exactly)
      - id: dbt-version-contracts
        name: dbt version requirements
        entry: ./testing/ci/validate-dbt-version-requirements.sh
        language: script
        stages: [pre-push]
        pass_filenames: false

      # Security: Bandit static analysis (matches CI)
      - id: bandit-security
        name: bandit (security scan)
        entry: uv run --no-sync bandit -c pyproject.toml -r packages/ -ll
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Security: Vulnerability audit (matches CI)
      - id: uv-secure
        name: uv-secure (vulnerability audit)
        entry: ./testing/ci/uv-security-audit.sh
        language: script
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Unit tests (all packages - matches CI)
      - id: pytest-unit
        name: pytest (unit tests + coverage)
        entry: ./testing/ci/test-unit.sh
        language: script
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Contract tests (cross-package validation - matches CI)
      - id: pytest-contract
        name: pytest (contract tests)
        entry: ./testing/ci/test-contract.sh
        language: script
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Hardcoded sleep check (matches CI - redundant but ensures alignment)
      - id: no-hardcoded-sleep-prepush
        name: no hardcoded sleep (pre-push)
        entry: scripts/pre-commit-no-sleep.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      # Requirement traceability (matches CI threshold)
      - id: traceability
        name: requirement traceability (80%)
        entry: uv run --no-sync python -m testing.traceability --all --threshold 80
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

      # Helm chart linting (matches CI - validates Helm charts before push)
      - id: helm-lint
        name: helm lint (charts)
        entry: ./testing/ci/lint-helm.sh
        language: script
        stages: [pre-push]
        files: ^charts/
        pass_filenames: false
