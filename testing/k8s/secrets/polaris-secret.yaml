---
# Polaris demo credential for E2E tests.
# This is a test-only credential with no access outside the Kind cluster.
# Matches the demo-admin principal configured by the Polaris Helm chart.
apiVersion: v1
kind: Secret
metadata:
  name: polaris-secret
  namespace: floe-test
  labels:
    app.kubernetes.io/component: testing
    app.kubernetes.io/part-of: floe-platform
type: Opaque
stringData:
  POLARIS_CREDENTIAL: "demo-admin:demo-secret"  # pragma: allowlist secret
