---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-artifacts
  namespace: floe-test
  labels:
    app.kubernetes.io/component: testing
    app.kubernetes.io/part-of: floe-platform
spec:
  # ReadWriteOnce is sufficient: standard and destructive Jobs run sequentially,
  # and Kind uses a single-node cluster. For multi-node clusters, use ReadWriteMany
  # or separate PVCs per Job.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
