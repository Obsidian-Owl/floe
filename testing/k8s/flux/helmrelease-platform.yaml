apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: floe-platform
  namespace: floe-test
spec:
  interval: 30m
  chart:
    spec:
      chart: ./charts/floe-platform/flux-artifacts/floe-platform.tgz
      reconcileStrategy: Revision
      valuesFiles:
        - ./charts/floe-platform/values.yaml
        - ./charts/floe-platform/values-test.yaml
      sourceRef:
        kind: GitRepository
        name: floe
        namespace: flux-system
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: uninstall
      remediateLastFailure: true
