---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2e-destructive-runner
  namespace: floe-test
  labels:
    app.kubernetes.io/component: testing
    app.kubernetes.io/part-of: floe-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: e2e-destructive-runner
  namespace: floe-test
  labels:
    app.kubernetes.io/component: testing
    app.kubernetes.io/part-of: floe-platform
rules:
  # --- All standard E2E runner permissions ---
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # --- Elevated permissions for destructive tests ---
  # Secrets access split by verb to enforce least privilege
  # (security-hardening AC-9).
  #
  # Read path: get/list/watch over ALL secrets — Helm needs to list
  # release secrets by label selector (`owner=helm`), which requires
  # unscoped `list`. This is acceptable for the destructive runner
  # only; the standard runner has `get`-only per AC-8.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Create path: K8s RBAC does NOT support `resourceNames` with
  # `create` (the name is not known at admission time). Create is
  # therefore unscoped here — documented limitation per AC-9.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  # Mutate path: update/delete are SCOPED to Helm 3 release secrets
  # (prefix `sh.helm.release.v1.`). This prevents the runner from
  # tampering with unrelated secrets in the namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "sh.helm.release.v1.floe.v1"
      - "sh.helm.release.v1.floe.v2"
      - "sh.helm.release.v1.floe.v3"
      - "sh.helm.release.v1.floe.v4"
      - "sh.helm.release.v1.floe.v5"
      - "sh.helm.release.v1.floe-test.v1"
      - "sh.helm.release.v1.floe-test.v2"
      - "sh.helm.release.v1.floe-test.v3"
      - "sh.helm.release.v1.floe-test.v4"
      - "sh.helm.release.v1.floe-test.v5"
    verbs: ["update", "delete"]
  # Deployments — required by TestHelmUpgrade (helm upgrade patches deployments)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "delete"]
  # StatefulSets — required by TestHelmUpgrade (helm upgrade patches statefulsets)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: e2e-destructive-runner
  namespace: floe-test
  labels:
    app.kubernetes.io/component: testing
    app.kubernetes.io/part-of: floe-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: e2e-destructive-runner
subjects:
  - kind: ServiceAccount
    name: e2e-destructive-runner
    namespace: floe-test
