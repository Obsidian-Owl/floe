name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "Makefile"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "testing/ci/validate-docs-navigation.py"
      - "testing/ci/validate_docs_navigation.py"
      - "testing/ci/tests/test_validate_docs_navigation.py"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "Makefile"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "testing/ci/validate-docs-navigation.py"
      - "testing/ci/validate_docs_navigation.py"
      - "testing/ci/tests/test_validate_docs_navigation.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --frozen
      - name: Validate docs navigation
        run: uv run python testing/ci/validate-docs-navigation.py
      - name: Build docs
        run: uv run mkdocs build --strict
