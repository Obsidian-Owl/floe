name: CodSpeed

on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  # Python 3.12+ required for CodSpeed execution profiles
  # See: https://codspeed.io/docs/instruments/cpu
  PYTHON_VERSION_DEFAULT: "3.12"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run benchmarks
        uses: CodSpeedHQ/action@0d7de549485db8284c0b87a0d2c0dd871097e641  # v4
        with:
          # CPU simulation for consistent comparisons with main branch
          # Python 3.12+ enables execution profiles (flamegraphs)
          mode: simulation
          run: uv run pytest benchmarks/ --codspeed
