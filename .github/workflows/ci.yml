# Continuous Integration Pipeline
# See .github/CI.md for strategy documentation
#
# Security: All actions pinned to full SHA hashes
# To update: gh api repos/OWNER/REPO/git/refs/tags/VERSION --jq '.object.sha'

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION_DEFAULT: "3.10"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ============================================================
  # Stage 1: Lint & Type Check (fast gate)
  # ============================================================
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff linting
        run: uv run ruff check .

      - name: Run ruff formatting check
        run: uv run ruff format --check .

      - name: Run mypy type checking
        run: uv run mypy --strict packages/ testing/

      - name: Check for hardcoded sleeps
        run: |
          echo "Checking for hardcoded time.sleep() in test code..."
          # Exclude:
          # - polling.py (the implementation that needs time.sleep)
          # - test_polling_example.py (documentation showing anti-patterns)
          # - Comments showing anti-patterns (# BAD, # Slow, etc.)
          # - Lines that are clearly mock/simulation code for testing timeouts
          VIOLATIONS=$(grep -rI "time\.sleep(" tests/ testing/ packages/*/tests/ 2>/dev/null \
            | grep -v "polling\.py" \
            | grep -v "test_polling_example\.py" \
            | grep -v "# .*time\.sleep" \
            | grep -v "DO NOT use time\.sleep" \
            | grep -v "instead of.*time\.sleep" \
            | grep -v "time\.sleep.*#.*BAD" \
            | grep -v "time\.sleep.*#.*Slow" \
            | grep -v "time\.sleep.*#.*Sleep" \
            | grep -v "time\.sleep.*#.*timeout" \
            | grep -v "time\.sleep.*#.*simulate" \
            | grep -Ev "^\s*#" \
            || true)

          if [[ -n "$VIOLATIONS" ]]; then
            echo "ERROR: Found hardcoded time.sleep() in test code:" >&2
            echo "$VIOLATIONS" >&2
            echo "" >&2
            echo "Use polling utilities instead: from testing.fixtures.polling import wait_for_condition" >&2
            exit 1
          fi
          echo "No problematic hardcoded sleeps found"

      - name: Validate dbt version requirements
        run: ./testing/ci/validate-dbt-version-requirements.sh

  # ============================================================
  # Stage 1b: Security Scanning (Bandit + pip-audit)
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Bandit security scan
        run: |
          # Use pyproject.toml config for bandit exclusions and skips
          uv run bandit -c pyproject.toml -r packages/ -ll -f json -o bandit-report.json || true
          uv run bandit -c pyproject.toml -r packages/ -ll

      - name: Run vulnerability audit
        uses: ./.github/actions/uv-security-audit

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ============================================================
  # Stage 2: Unit Tests (matrix across Python versions)
  # ============================================================
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests with coverage
        run: ./testing/ci/test-unit.sh
        env:
          COVERAGE_THRESHOLD: 80
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Upload coverage artifact
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report
          path: coverage-${{ matrix.python-version }}.xml
          retention-days: 7

  # ============================================================
  # Stage 2b: Contract Tests (cross-package validation)
  # ============================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.1.3

      - name: Add Helm repositories
        run: |
          helm repo add dagster https://dagster-io.github.io/helm
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

      - name: Update chart dependencies
        # Pre-build chart dependencies so helm-rendering contract tests
        # (test_helm_security_contexts, test_rbac_least_privilege,
        # test_test_infra_chart_integrity) can run offline per
        # .claude/rules/test-organization.md.
        run: |
          helm dependency update charts/floe-platform
          helm dependency update charts/floe-jobs

      - name: Run contract tests
        run: |
          # Run both root-level and package-level contract tests
          # Package-level contract tests validate internal package contracts
          uv run pytest tests/contract/ packages/*/tests/contract/ \
            --ignore-glob="**/tests/contract/__pycache__/**" \
            -v \
            --tb=short

  # ============================================================
  # Note: Integration Tests moved to release.yml and weekly.yml
  # Integration tests require K8s cluster (~10 min) - too slow for PR CI
  # See .github/CI.md for workflow documentation
  # ============================================================

  # ============================================================
  # Stage 2c: Traceability Check
  # ============================================================
  traceability:
    name: Requirement Traceability
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run traceability check
        run: |
          uv run python -m testing.traceability --all --threshold 80

  # ============================================================
  # Summary Job (for branch protection)
  # ============================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-typecheck, security, unit-tests, contract-tests, traceability]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          LINT_RESULT: ${{ needs.lint-typecheck.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          CONTRACT_RESULT: ${{ needs.contract-tests.result }}
          TRACEABILITY_RESULT: ${{ needs.traceability.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" ]]; then
            echo "lint-typecheck failed" >&2
            exit 1
          fi
          if [[ "$SECURITY_RESULT" != "success" ]]; then
            echo "security scan failed" >&2
            exit 1
          fi
          if [[ "$UNIT_RESULT" != "success" ]]; then
            echo "unit-tests failed" >&2
            exit 1
          fi
          if [[ "$CONTRACT_RESULT" != "success" ]]; then
            echo "contract-tests failed" >&2
            exit 1
          fi
          if [[ "$TRACEABILITY_RESULT" != "success" ]]; then
            echo "traceability check failed" >&2
            exit 1
          fi
          echo "All CI checks passed!"
