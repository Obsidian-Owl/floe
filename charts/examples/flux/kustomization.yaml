# Flux Kustomization for floe-platform
#
# This template orchestrates the deployment of floe-platform using
# Flux CD's Kustomization CRD for GitOps-based management.
#
# Directory structure expected:
#   clusters/
#     production/
#       floe-platform/
#         kustomization.yaml (this file)
#         helmrelease.yaml
#     staging/
#       floe-platform/
#         kustomization.yaml
#         helmrelease.yaml
#
# Prerequisites:
#   1. Flux v2 installed in the cluster
#   2. GitRepository source configured pointing to this repo
#
# Usage:
#   1. Place this file in your clusters/<env>/floe-platform/ directory
#   2. Update spec.sourceRef to point to your GitRepository
#   3. Flux will automatically reconcile
#
# Secrets management:
#   This file shows SOPS with Age for secret decryption.
#   For enterprise environments, consider External Secrets Operator (ESO)
#   instead of SOPS — see https://external-secrets.io
#   ESO integrates with AWS Secrets Manager, HashiCorp Vault, and others.
#
# Requirements:
# - 9b-FR-072: Flux Kustomization template
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: floe-platform
  namespace: flux-system
spec:
  # Reconciliation interval
  interval: 10m

  # Retry interval on failure
  retryInterval: 2m

  # Timeout for apply operations
  timeout: 5m

  # Source reference (GitRepository or OCIRepository)
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  # Path to kustomize overlay or resources
  path: ./clusters/dev/floe-platform

  # Prune resources no longer in source
  prune: true

  # Wait for resources to be ready
  wait: true

  # Force apply (use with caution)
  force: false

  # Target namespace for resources without explicit namespace
  targetNamespace: floe-dev

  # Health checks for deployed resources
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-dagster-webserver
      namespace: floe-dev
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-dagster-daemon
      namespace: floe-dev
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-polaris
      namespace: floe-dev

  # External values sources — load values from ConfigMaps.
  # Use valuesFrom with HelmRelease resources referenced by this
  # Kustomization to inject environment-specific configuration.
  # valuesFrom:
  #   - kind: ConfigMap
  #     name: floe-env-values
  #     valuesKey: values.yaml

  # Patches to apply (optional)
  # patches:
  #   - patch: |
  #       - op: replace
  #         path: /spec/values/global/environment
  #         value: dev
  #     target:
  #       kind: HelmRelease
  #       name: floe-platform-dev

  # SOPS Age decryption for encrypted secrets (optional)
  #
  # Age is the recommended key management method for SOPS (replaces GPG).
  # Setup steps:
  #   1. Install age: brew install age (macOS) or apt install age (Linux)
  #   2. Generate a key pair: age-keygen -o age.txt
  #   3. Create the Kubernetes secret with the Age private key:
  #      kubectl create secret generic sops-age \
  #        --namespace=flux-system \
  #        --from-file=age.agekey=age.txt
  #   4. Encrypt values: sops --age <AGE-PUBLIC-KEY> --encrypt values.yaml
  #   5. Uncomment the decryption block below
  #
  # decryption:
  #   provider: sops
  #   secretRef:
  #     name: sops-age

  # Post-build variable substitution (optional)
  # postBuild:
  #   substitute:
  #     ENVIRONMENT: dev
  #     CLUSTER_NAME: dev-cluster
  #   substituteFrom:
  #     - kind: ConfigMap
  #       name: cluster-vars
  #     - kind: Secret
  #       name: cluster-secrets

  # Dependencies - wait for these before reconciling
  # dependsOn:
  #   - name: infrastructure
  #     namespace: flux-system

---
# Example: Multi-environment setup with Kustomization per environment
#
# Base HelmRelease that other environments inherit from
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: floe-platform-base
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./charts/examples/flux
  prune: false
  # Base doesn't apply directly, just defines resources
  suspend: true
---
# Staging environment
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: floe-platform-staging
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/staging/floe-platform
  prune: true
  wait: true
  targetNamespace: floe-staging
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-dagster-webserver
      namespace: floe-staging
  postBuild:
    substitute:
      ENVIRONMENT: staging
---
# Production environment (with manual gating)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: floe-platform-prod
  namespace: flux-system
spec:
  interval: 30m  # Less frequent for production
  retryInterval: 5m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/prod/floe-platform
  prune: false  # Don't auto-prune in production
  wait: true
  targetNamespace: floe-prod
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-dagster-webserver
      namespace: floe-prod
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-dagster-daemon
      namespace: floe-prod
    - apiVersion: apps/v1
      kind: Deployment
      name: floe-polaris
      namespace: floe-prod
  postBuild:
    substitute:
      ENVIRONMENT: prod
  # Production requires the staging deployment to be healthy
  dependsOn:
    - name: floe-platform-staging
