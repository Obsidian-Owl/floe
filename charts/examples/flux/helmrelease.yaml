# Flux HelmRelease for floe-platform
#
# This template deploys floe-platform using Flux CD's HelmRelease CRD.
# Requires Flux v2 with the helm-controller and source-controller.
#
# Prerequisites:
#   1. Flux v2 installed in the cluster
#   2. OCIRepository source configured (see ocirepository.yaml)
#   3. Namespace created (or use spec.install.createNamespace)
#
# Usage:
#   1. Create the OCIRepository source first (ocirepository.yaml)
#   2. Update spec.values or spec.valuesFrom as needed
#   3. Apply: kubectl apply -f helmrelease.yaml
#
# Requirements:
# - 9b-FR-072: Flux HelmRelease template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: floe-platform-dev
  namespace: flux-system
  labels:
    app.kubernetes.io/name: floe-platform
    app.kubernetes.io/instance: floe-dev
    app.kubernetes.io/managed-by: flux
spec:
  # Name of the Helm release in the target namespace
  releaseName: floe

  # Namespace where resources will be deployed
  targetNamespace: floe-dev

  # Chart source — references the companion OCIRepository resource
  chart:
    spec:
      chart: floe-platform
      version: ">=1.0.0"
      sourceRef:
        kind: OCIRepository
        name: floe-platform
        namespace: flux-system
      # Reconciliation interval for chart updates
      interval: 5m

  # How often Flux reconciles this release
  interval: 10m

  # Installation configuration — first-time deploy settings
  install:
    # Create namespace if it doesn't exist
    createNamespace: true
    # Remediation on install failure
    remediation:
      retries: 3
    # Timeout for install
    timeout: 10m

  # Upgrade configuration — rolling update settings
  upgrade:
    # Remediation on upgrade failure
    remediation:
      retries: 3
      # Use rollback strategy: reverts to last known-good release.
      # For test environments, use 'strategy: uninstall' instead
      # to get a clean slate on each failure.
      strategy: rollback
      # Remediate even on the last retry failure
      remediateLastFailure: true
    # Clean up failed upgrade resources before remediation
    cleanupOnFail: true
    # Timeout for upgrade
    timeout: 10m

  # Rollback configuration — settings when remediation triggers rollback
  rollback:
    # Timeout for rollback
    timeout: 5m
    # Clean up on rollback
    cleanupOnFail: true

  # Uninstall configuration — cleanup behaviour on HelmRelease deletion
  uninstall:
    # Keep history on uninstall
    keepHistory: false
    # Timeout for uninstall
    timeout: 5m

  # Inline values — override chart defaults for this environment
  values:
    global:
      environment: dev

    namespace:
      name: floe-dev
      create: false  # Flux creates it via install.createNamespace

    dagster:
      enabled: true

    polaris:
      enabled: true

    postgresql:
      enabled: true

    minio:
      enabled: true

    networkPolicy:
      enabled: false

  # External values sources — load values from ConfigMaps or Secrets.
  # Use valuesFrom to externalise environment-specific values so the
  # same HelmRelease can be reused across environments.
  # To use: create the ConfigMap first, then uncomment the block below.
  # valuesFrom:
  #   - kind: ConfigMap
  #     name: floe-values
  #     valuesKey: values.yaml
  #   - kind: Secret
  #     name: floe-secrets
  #     valuesKey: secrets.yaml

  # Depends on other HelmReleases (optional)
  # dependsOn:
  #   - name: cert-manager
  #     namespace: cert-manager

  # Drift detection — detect and correct out-of-band changes
  driftDetection:
    mode: enabled
    ignore:
      # Ignore replica count changes (may be controlled by HPA)
      - paths:
          - /spec/replicas
        target:
          kind: Deployment
