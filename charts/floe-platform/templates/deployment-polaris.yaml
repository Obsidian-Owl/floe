{{- if .Values.polaris.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "floe-platform.polaris.fullname" . }}
  labels:
    {{- include "floe-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: polaris
spec:
  replicas: {{ .Values.polaris.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "floe-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: polaris
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-polaris.yaml") . | sha256sum }}
        {{- with .Values.polaris.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "floe-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: polaris
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "floe-platform.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      {{- if and .Values.polaris.persistence .Values.polaris.persistence.jdbc (eq (.Values.polaris.persistence.type | default "in-memory") "relational-jdbc") }}
      initContainers:
        {{- include "floe-platform.waitForPostgres" . | nindent 8 }}
        - name: check-polaris-bootstrap
          image: postgres:16-alpine
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            capabilities:
              drop:
                - ALL
          env:
            - name: JDBC_URL
              value: {{ .Values.polaris.persistence.jdbc.url | quote }}
            - name: PGUSER
              value: {{ .Values.polaris.persistence.jdbc.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: jdbc-password
            - name: POLARIS_BOOTSTRAP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: client-id
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              CONNECTION_TARGET="${JDBC_URL#jdbc:postgresql://}"
              if [ "${CONNECTION_TARGET}" = "${JDBC_URL}" ]; then
                echo "ERROR: Unsupported PostgreSQL JDBC URL: ${JDBC_URL}" >&2
                exit 1
              fi

              AUTHORITY="${CONNECTION_TARGET%%/*}"
              DB_NAME="${CONNECTION_TARGET#*/}"
              DB_NAME="${DB_NAME%%\?*}"
              if [ -z "${AUTHORITY}" ] || [ -z "${DB_NAME}" ] || [ "${DB_NAME}" = "${CONNECTION_TARGET}" ]; then
                echo "ERROR: Unable to parse database name from JDBC URL: ${JDBC_URL}" >&2
                exit 1
              fi

              case "${AUTHORITY}" in
                \[*\]:*)
                  PGHOST_PARSED="${AUTHORITY%\]:*}"
                  PGHOST_PARSED="${PGHOST_PARSED#\[}"
                  PGPORT_PARSED="${AUTHORITY##*\]:}"
                  ;;
                *:*)
                  PGHOST_PARSED="${AUTHORITY%:*}"
                  PGPORT_PARSED="${AUTHORITY##*:}"
                  ;;
                *)
                  PGHOST_PARSED="${AUTHORITY}"
                  PGPORT_PARSED="5432"
                  ;;
              esac

              export PGHOST="${PGHOST_PARSED}"
              export PGPORT="${PGPORT_PARSED}"
              export PGDATABASE="${DB_NAME}"

              SCHEMA_READY=$(psql -tA -c "select 1 from information_schema.tables where table_schema = 'polaris_schema' and table_name = 'version' limit 1;")
              PRINCIPAL_READY=""

              if [ "${SCHEMA_READY}" = "1" ]; then
                PRINCIPAL_READY=$(psql -tA \
                  -v client_id="${POLARIS_BOOTSTRAP_CLIENT_ID}" \
                  -c "select 1 from polaris_schema.principal_authentication_data where realm_id = 'POLARIS' and principal_client_id = :'client_id' limit 1;")
              fi

              if [ "${SCHEMA_READY}" = "1" ] && [ "${PRINCIPAL_READY}" = "1" ]; then
                echo "Polaris metastore already bootstrapped; skipping bootstrap init container"
                rm -f /work/polaris-bootstrap-required
              else
                echo "Polaris metastore bootstrap required"
                touch /work/polaris-bootstrap-required
              fi
          volumeMounts:
            - name: work
              mountPath: /work
        - name: bootstrap-polaris-metastore
          image: "apache/polaris-admin-tool:{{ .Values.polaris.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.polaris.image.pullPolicy | default .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "floe-platform.containerSecurityContext" . | nindent 12 }}
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: QUARKUS_DATASOURCE_USERNAME
              value: {{ .Values.polaris.persistence.jdbc.username | quote }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: jdbc-password
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: {{ .Values.polaris.persistence.jdbc.url | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if [ ! -f /work/polaris-bootstrap-required ]; then
                echo "Polaris metastore bootstrap not required"
                exit 0
              fi

              BOOTSTRAP_CREDENTIALS=$(cat /bootstrap/bootstrap-credentials)
              exec java -jar /deployments/polaris-admin-tool.jar bootstrap -r POLARIS -c "${BOOTSTRAP_CREDENTIALS}"
          volumeMounts:
            - name: bootstrap-credentials
              mountPath: /bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: work
              mountPath: /work
            - name: home
              mountPath: /home/polaris
      {{- end }}
      containers:
        - name: polaris
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.polaris.image.repository }}:{{ .Values.polaris.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.polaris.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.polaris.service.port | default 8181 }}
              protocol: TCP
            - name: management
              containerPort: {{ .Values.polaris.service.managementPort | default 8182 }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.polaris.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.polaris.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.polaris.resources | nindent 12 }}
          env:
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: bootstrap-credentials
            - name: JAVA_OPTS_APPEND
              value: >-
                {{- range $key, $val := .Values.polaris.config.features }}
                -Dpolaris.features."{{ $key }}"={{ $val }}
                {{- end }}
                {{- /* NOTE: -Daws.s3UsePathStyle is NOT a valid AWS SDK v2 property.
                     Path-style S3 access is configured via storageConfigInfo.pathStyleAccess
                     in the catalog, which flows through AwsCredentialsStorageIntegration
                     to S3FileIO's s3.path-style-access property.
                     Requires SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION=false. */}}
            {{- if and .Values.polaris.persistence (eq (.Values.polaris.persistence.type | default "in-memory") "relational-jdbc") }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: jdbc-password
            {{- end }}
            {{- if .Values.polaris.storage.s3.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: aws-secret-access-key
            - name: AWS_REGION
              value: {{ .Values.polaris.storage.s3.region | quote }}
            - name: AWS_ENDPOINT_URL_S3
              value: {{ .Values.polaris.storage.s3.endpoint | quote }}
            {{- if .Values.polaris.storage.s3.stsEndpoint }}
            - name: AWS_ENDPOINT_URL_STS
              value: {{ .Values.polaris.storage.s3.stsEndpoint | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.polaris.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /deployments/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: work
              mountPath: /work
            - name: home
              mountPath: /home/jboss
      volumes:
        - name: config
          configMap:
            name: {{ include "floe-platform.polaris.fullname" . }}-config
        - name: bootstrap-credentials
          secret:
            secretName: {{ include "floe-platform.polaris.credentialSecretName" . }}
            items:
              - key: bootstrap-credentials
                path: bootstrap-credentials
        - name: tmp
          emptyDir: {}
        - name: work
          emptyDir: {}
        - name: home
          emptyDir: {}
      {{- with .Values.polaris.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polaris.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polaris.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
