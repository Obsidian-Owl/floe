{{- if and .Values.polaris.enabled .Values.polaris.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "floe-platform.polaris.fullname" . }}-bootstrap
  labels:
    {{- include "floe-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: polaris-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: {{ .Values.polaris.bootstrap.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.polaris.bootstrap.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "floe-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: polaris-bootstrap
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
{{- if .Values.minio.enabled }}
        - name: wait-for-minio
          image: curlimages/curl:8.5.0@sha256:08e466006f0860e54fc299378de998935333e0e130a15f6f98482e9f8dab3058
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              ATTEMPT=0
              MAX_ATTEMPTS=20
              DELAY=2
              {{- $minioSvc := printf "%s-minio" (include "floe-platform.fullname" .) }}
              until curl -sf http://{{ $minioSvc }}:9000/minio/health/ready > /dev/null 2>&1; do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                  echo "ERROR: MinIO not ready after $MAX_ATTEMPTS attempts" >&2
                  exit 1
                fi
                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - MinIO not ready, waiting ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
                [ "$DELAY" -gt 30 ] && DELAY=30
              done
              echo "MinIO is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
{{- end }}
        - name: wait-for-polaris
          image: curlimages/curl:8.5.0@sha256:08e466006f0860e54fc299378de998935333e0e130a15f6f98482e9f8dab3058
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Waiting for Polaris to be ready..."
              ATTEMPT=0
              MAX_ATTEMPTS=30
              DELAY=2
              until curl -sf http://{{ include "floe-platform.polaris.fullname" . }}:{{ .Values.polaris.service.managementPort | default 8182 }}/q/health/ready > /dev/null 2>&1; do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                  echo "ERROR: Polaris not ready after $MAX_ATTEMPTS attempts" >&2
                  exit 1
                fi
                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Polaris not ready, waiting ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
                [ "$DELAY" -gt 30 ] && DELAY=30
              done
              echo "Polaris is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: bootstrap
          image: curlimages/curl:8.5.0@sha256:08e466006f0860e54fc299378de998935333e0e130a15f6f98482e9f8dab3058
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # POLARIS_CATALOG_NAME is the canonical runtime source for the
            # catalog/warehouse identifier. Both the shell script below and
            # the contract test (AC-3) read from this env var — never from
            # a hardcoded literal or a regex-scanned shell body. Sourced
            # from .Values.polaris.bootstrap.catalogName via the warehouse
            # helper so every consumer lands on the same key.
            - name: POLARIS_CATALOG_NAME
              value: {{ include "floe-platform.polaris.warehouse" . | quote }}
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: client-id
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: client-secret
            {{- if .Values.polaris.storage.s3.enabled }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: aws-access-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "floe-platform.polaris.credentialSecretName" . }}
                  key: aws-secret-access-key
            {{- end }}
          command:
            - sh
            - -c
            - |
              trap 'rm -f /tmp/response.txt /tmp/verify.txt' EXIT
              set -e
              log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] BOOTSTRAP: $*"; }

              # Preflight: check required environment variables
              if [ -z "$POLARIS_CLIENT_ID" ]; then
                log "ERROR: POLARIS_CLIENT_ID is not set or empty" >&2
                exit 42
              fi
              if [ -z "$POLARIS_CLIENT_SECRET" ]; then
                log "ERROR: POLARIS_CLIENT_SECRET is not set or empty" >&2
                exit 42
              fi
              if [ -z "$POLARIS_CATALOG_NAME" ]; then
                log "ERROR: POLARIS_CATALOG_NAME is not set or empty" >&2
                exit 42
              fi
              # Validate catalog name — same character class as grant validation
              # below. Rejects shell metacharacters and whitespace.
              case "$POLARIS_CATALOG_NAME" in
                *[!a-zA-Z0-9_-]*)
                  log "ERROR: POLARIS_CATALOG_NAME contains invalid characters: $POLARIS_CATALOG_NAME" >&2
                  exit 42
                  ;;
              esac

              POLARIS_URL="http://{{ include "floe-platform.polaris.fullname" . }}:{{ .Values.polaris.service.port | default 8181 }}"
              {{- $totalSteps := 3 }}
              {{- if .Values.polaris.storage.s3.enabled }}
              {{- $totalSteps = add $totalSteps 1 }}
              {{- end }}
              {{- if .Values.polaris.bootstrap.grants.enabled }}
              {{- $totalSteps = add $totalSteps 5 }}
              {{- end }}
              {{- $step := 1 }}

              log "Step {{ $step }}/{{ $totalSteps }}: Acquiring OAuth token..."
              # NOTE: grep/cut token extraction assumes compact JSON (no whitespace around colons).
              # Polaris returns compact JSON by default. jq unavailable in curl image.
              TOKEN=$(printf 'grant_type=client_credentials&client_id=%s&client_secret=%s&scope=PRINCIPAL_ROLE:ALL' \
                "$POLARIS_CLIENT_ID" "$POLARIS_CLIENT_SECRET" | \
                curl -s --fail-with-body -X POST \
                "$POLARIS_URL/api/catalog/v1/oauth/tokens" \
                -d @- | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

              if [ -z "$TOKEN" ]; then
                log "ERROR: Failed to acquire OAuth token" >&2
                exit 1
              fi
              log "Token acquired successfully"

              {{- if .Values.polaris.storage.s3.enabled }}
              {{- $bucketName := trimPrefix "s3://" .Values.polaris.bootstrap.defaultBaseLocation | splitList "/" | first }}
              # Verify MinIO is responsive before creating catalog.
              # NOTE: This anonymous curl check returns HTTP 403 for BOTH existing
              # and non-existing buckets (MinIO security: no bucket enumeration for
              # anonymous callers). It is NOT a bucket existence check — it is a
              # health/responsiveness check only. The bucket is guaranteed to exist
              # at this point because defaultBuckets creates it at MinIO startup
              # (before this bootstrap job runs). The ensure-bucket.py script in
              # test-e2e.sh provides authenticated defense-in-depth verification.
              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Verifying MinIO is responsive for bucket '{{ $bucketName }}'..."
              MINIO_URL="{{ .Values.polaris.storage.s3.endpoint }}"
              BUCKET_NAME="{{ $bucketName }}"
              BUCKET_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$MINIO_URL/$BUCKET_NAME/" 2>/dev/null)
              if [ "$BUCKET_CODE" = "404" ]; then
                log "ERROR: MinIO bucket '$BUCKET_NAME' does not exist (HTTP 404)" >&2
                log "Ensure defaultBuckets includes '$BUCKET_NAME' in values." >&2
                exit 1
              fi
              log "MinIO responsive for bucket '$BUCKET_NAME' (HTTP $BUCKET_CODE)"
              {{- end }}

              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Creating catalog '$POLARIS_CATALOG_NAME'..."
              {{- if .Values.polaris.storage.s3.enabled }}
              # Build catalog JSON with S3 credentials from environment.
              # Unquoted heredoc (<<EOJSON) expands shell variables — the
              # catalog name comes from $POLARIS_CATALOG_NAME (env), not
              # a template literal, so the contract test walker can verify
              # the single source of truth via the K8s API surface.
              CATALOG_JSON=$(cat <<EOJSON
              {
                "catalog": {
                  "name": "$POLARIS_CATALOG_NAME",
                  "type": "INTERNAL",
                  "properties": {
                    "default-base-location": "{{ .Values.polaris.bootstrap.defaultBaseLocation }}",
                    "s3.endpoint": "{{ .Values.polaris.storage.s3.endpoint }}",
                    "s3.path-style-access": "true",
                    "s3.access-key-id": "$S3_ACCESS_KEY",
                    "s3.secret-access-key": "$S3_SECRET_KEY",
                    "s3.region": "{{ .Values.polaris.storage.s3.region | default "us-east-1" }}"
                  },
                  "storageConfigInfo": {
                    "storageType": "S3",
                    "allowedLocations": {{ .Values.polaris.bootstrap.allowedLocations | toJson }},
                    "endpoint": "{{ .Values.polaris.storage.s3.endpoint }}",
                    "endpointInternal": "{{ .Values.polaris.storage.s3.endpoint }}",
                    "pathStyleAccess": {{ .Values.polaris.storage.s3.pathStyleAccess | default true }},
                    "region": "{{ .Values.polaris.storage.s3.region | default "us-east-1" }}",
                    "stsUnavailable": true
                  }
                }
              }
              EOJSON
              )
              {{- else }}
              # Unquoted heredoc so $POLARIS_CATALOG_NAME expands (single
              # source of truth via env var, not template literal).
              CATALOG_JSON=$(cat <<EOJSON
              {
                "catalog": {
                  "name": "$POLARIS_CATALOG_NAME",
                  "type": "INTERNAL",
                  "properties": {
                    "default-base-location": "{{ .Values.polaris.bootstrap.defaultBaseLocation }}"
                  },
                  "storageConfigInfo": {
                    "storageType": "S3",
                    "allowedLocations": {{ .Values.polaris.bootstrap.allowedLocations | toJson }}
                  }
                }
              }
              EOJSON
              )
              {{- end }}

              HTTP_CODE=$(printf '%s' "$CATALOG_JSON" | curl -s -o /tmp/response.txt -w '%{http_code}' -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/catalogs" \
                -d @-)

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                log "Catalog '$POLARIS_CATALOG_NAME' created successfully"
              elif [ "$HTTP_CODE" = "409" ]; then
                log "Catalog '$POLARIS_CATALOG_NAME' already exists (HTTP 409) - OK"
              else
                log "ERROR: Failed to create catalog (HTTP $HTTP_CODE)" >&2
                head -5 /tmp/response.txt >&2
                exit 1
              fi

              # Verify catalog exists via management API
              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Verifying catalog '$POLARIS_CATALOG_NAME' via management API..."
              VERIFY_CODE=$(curl -s -o /tmp/verify.txt -w '%{http_code}' \
                -H "Authorization: Bearer $TOKEN" \
                "$POLARIS_URL/api/management/v1/catalogs/$POLARIS_CATALOG_NAME")

              if [ "$VERIFY_CODE" != "200" ]; then
                log "ERROR: Catalog verification failed (HTTP $VERIFY_CODE)" >&2
                head -5 /tmp/verify.txt >&2
                exit 1
              fi

              # Verify response contains expected catalog name
              if ! grep -q '"name"' /tmp/verify.txt; then
                log "ERROR: Catalog verification response missing 'name' field" >&2
                head -5 /tmp/verify.txt >&2
                exit 1
              fi
              log "Catalog '$POLARIS_CATALOG_NAME' verified successfully"

              {{- if .Values.polaris.bootstrap.grants.enabled }}
              # Create catalog role (idempotent — 201 created, 409 already exists)
              # CATALOG_NAME aliases POLARIS_CATALOG_NAME for downstream grant
              # steps so the validation loop and URL interpolations read the
              # same canonical env var.
              CATALOG_ROLE="{{ .Values.polaris.bootstrap.grants.catalogRole }}"
              CATALOG_NAME="$POLARIS_CATALOG_NAME"
              PRINCIPAL_ROLE="{{ .Values.polaris.bootstrap.grants.principalRole }}"
              BOOTSTRAP_PRINCIPAL="{{ .Values.polaris.bootstrap.grants.bootstrapPrincipal }}"

              # Validate grant values — reject shell metacharacters and path traversal.
              # Uses explicit case dispatch instead of eval to avoid code injection risk.
              for GRANT_VAR_NAME in CATALOG_ROLE CATALOG_NAME PRINCIPAL_ROLE BOOTSTRAP_PRINCIPAL; do
                case "$GRANT_VAR_NAME" in
                  CATALOG_ROLE) GRANT_VAR_VAL="$CATALOG_ROLE" ;;
                  CATALOG_NAME) GRANT_VAR_VAL="$CATALOG_NAME" ;;
                  PRINCIPAL_ROLE) GRANT_VAR_VAL="$PRINCIPAL_ROLE" ;;
                  BOOTSTRAP_PRINCIPAL) GRANT_VAR_VAL="$BOOTSTRAP_PRINCIPAL" ;;
                  *) log "ERROR: Unknown variable: $GRANT_VAR_NAME" >&2; exit 42 ;;
                esac
                case "$GRANT_VAR_VAL" in
                  *[!a-zA-Z0-9_-]*) log "ERROR: $GRANT_VAR_NAME contains invalid characters: $GRANT_VAR_VAL" >&2; exit 42 ;;
                  "") log "ERROR: $GRANT_VAR_NAME is empty" >&2; exit 42 ;;
                esac
              done

              # Validate privilege values — Polaris privileges are uppercase [A-Z_] identifiers.
              # Values are rendered from values.yaml at Helm template time, but the case
              # statement executes at pod runtime — catching misconfigurations at startup.
              {{- range .Values.polaris.bootstrap.grants.privileges }}
              case "{{ . }}" in
                *[!A-Z_]*) log "ERROR: privilege contains invalid characters: {{ . }}" >&2; exit 42 ;;
                "") log "ERROR: privilege is empty" >&2; exit 42 ;;
              esac
              {{- end }}
              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Creating principal role '$PRINCIPAL_ROLE'..."
              PR_CREATE_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/principal-roles" \
                -d "{\"principalRole\": {\"name\": \"$PRINCIPAL_ROLE\"}}")

              if [ "$PR_CREATE_CODE" = "201" ]; then
                log "Principal role '$PRINCIPAL_ROLE' created successfully"
              elif [ "$PR_CREATE_CODE" = "409" ]; then
                log "Principal role '$PRINCIPAL_ROLE' already exists (HTTP 409) - OK"
              else
                log "ERROR: Failed to create principal role (HTTP $PR_CREATE_CODE). Check Polaris logs for detail." >&2
                exit 1
              fi

              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Assigning principal role '$PRINCIPAL_ROLE' to principal '$BOOTSTRAP_PRINCIPAL'..."
              PR_ASSIGN_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/principals/$BOOTSTRAP_PRINCIPAL/principal-roles" \
                -d "{\"principalRole\": {\"name\": \"$PRINCIPAL_ROLE\"}}")

              if [ "$PR_ASSIGN_CODE" = "200" ] || [ "$PR_ASSIGN_CODE" = "201" ] || [ "$PR_ASSIGN_CODE" = "204" ]; then
                log "Principal role '$PRINCIPAL_ROLE' assigned to principal '$BOOTSTRAP_PRINCIPAL' successfully"
              elif [ "$PR_ASSIGN_CODE" = "409" ]; then
                log "Principal role '$PRINCIPAL_ROLE' already assigned to '$BOOTSTRAP_PRINCIPAL' (HTTP 409) - OK"
              else
                log "ERROR: Failed to assign principal role (HTTP $PR_ASSIGN_CODE). Check Polaris logs for detail." >&2
                exit 1
              fi

              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Creating catalog role '$CATALOG_ROLE' on catalog '$CATALOG_NAME'..."
              ROLE_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/catalogs/$CATALOG_NAME/catalog-roles" \
                -d "{\"catalogRole\": {\"name\": \"$CATALOG_ROLE\"}}")

              if [ "$ROLE_CODE" = "201" ]; then
                log "Catalog role '$CATALOG_ROLE' created successfully"
              elif [ "$ROLE_CODE" = "409" ]; then
                log "Catalog role '$CATALOG_ROLE' already exists (HTTP 409) - OK"
              else
                log "ERROR: Failed to create catalog role (HTTP $ROLE_CODE)" >&2
                head -5 /tmp/response.txt >&2
                exit 1
              fi

              # Grant privileges to catalog role
              {{- $step = add $step 1 }}
              {{- range .Values.polaris.bootstrap.grants.privileges }}
              log "Step {{ $step }}/{{ $totalSteps }}: Granting privilege '{{ . }}' to catalog role '$CATALOG_ROLE'..."
              GRANT_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/catalogs/$CATALOG_NAME/catalog-roles/$CATALOG_ROLE/grants" \
                -d "{\"grant\": {\"type\": \"catalog\", \"privilege\": \"{{ . }}\"}}")

              if [ "$GRANT_CODE" = "201" ] || [ "$GRANT_CODE" = "200" ] || [ "$GRANT_CODE" = "204" ]; then
                log "Privilege '{{ . }}' granted successfully"
              elif [ "$GRANT_CODE" = "409" ]; then
                log "Privilege '{{ . }}' already granted (HTTP 409) - OK"
              else
                log "ERROR: Failed to grant privilege '{{ . }}' (HTTP $GRANT_CODE)" >&2
                head -5 /tmp/response.txt >&2
                exit 1
              fi
              {{- end }}

              # Assign catalog role to principal role (idempotent — 200/201/204 success, 409 already assigned)
              {{- $step = add $step 1 }}
              log "Step {{ $step }}/{{ $totalSteps }}: Assigning catalog role '$CATALOG_ROLE' to principal role '$PRINCIPAL_ROLE'..."
              ASSIGN_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "$POLARIS_URL/api/management/v1/principal-roles/$PRINCIPAL_ROLE/catalog-roles/$CATALOG_NAME" \
                -d "{\"catalogRole\": {\"name\": \"$CATALOG_ROLE\"}}")

              if [ "$ASSIGN_CODE" = "200" ] || [ "$ASSIGN_CODE" = "201" ] || [ "$ASSIGN_CODE" = "204" ]; then
                log "Catalog role '$CATALOG_ROLE' assigned to principal role '$PRINCIPAL_ROLE' successfully"
              elif [ "$ASSIGN_CODE" = "409" ]; then
                log "Catalog role '$CATALOG_ROLE' already assigned to '$PRINCIPAL_ROLE' (HTTP 409) - OK"
              else
                log "ERROR: Failed to assign catalog role (HTTP $ASSIGN_CODE)" >&2
                head -5 /tmp/response.txt >&2
                exit 1
              fi
              {{- end }}

              log "Bootstrap complete!"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
