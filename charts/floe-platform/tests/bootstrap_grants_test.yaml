# T1/T2/T3: Bootstrap grant tests
# Verifies Polaris catalog role creation, privilege grants, and
# principal role assignment steps in the bootstrap job.
suite: bootstrap grants
templates:
  - templates/job-polaris-bootstrap.yaml
tests:
  # --- T1: Grant configuration defaults ---
  - it: should render grant steps when grants.enabled is true
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "catalog-roles"

  - it: should skip grant steps when grants.enabled is false
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: false
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "catalog-roles"

  # --- T2: Create catalog role (idempotent) ---
  - it: should POST to catalog-roles endpoint
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "-X POST[\\s\\S]*catalog-roles"

  - it: should handle 201 and 409 for catalog role creation
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "ROLE_CODE"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"201"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"409"'

  # --- T2: Grant privileges ---
  - it: should PUT to catalog-roles grants endpoint
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "catalog-roles/.*/grants"

  - it: should render each privilege in the loop
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - TABLE_CREATE
        - TABLE_WRITE_DATA
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "TABLE_CREATE"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "TABLE_WRITE_DATA"

  - it: should handle 204 and 409 for grant privilege idempotency
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "GRANT_CODE"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"204"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"409"'

  - it: should tolerate duplicate grant record 500 during privilege grants
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'is_duplicate_grant_record_error'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'GRANT_CODE" = "500" ] && is_duplicate_grant_record_error'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'duplicate grant record, Polaris returned HTTP 500'

  # --- T2: Assign catalog role to principal role ---
  - it: should PUT to principal-roles endpoint
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      # Shell variable $PRINCIPAL_ROLE is set from Go template value
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'PRINCIPAL_ROLE="floe-pipeline"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "principal-roles/\\$PRINCIPAL_ROLE/catalog-roles"

  - it: should handle 200/204 and 409 for principal role assignment
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "ASSIGN_CODE"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"200".*"204"|"204".*"200"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: '"409"'

  - it: should tolerate duplicate grant record 500 during catalog role assignment
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'ASSIGN_CODE" = "500" ] && is_duplicate_grant_record_error'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'grant_records_pkey'

  # --- T2: Create and assign principal role ---
  - it: should POST to principal-roles endpoint to create principal role
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "-X POST[\\s\\S]*/api/management/v1/principal-roles"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "PR_CREATE_CODE"

  - it: should PUT to assign principal role to bootstrap principal
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'BOOTSTRAP_PRINCIPAL="root"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "-X PUT[\\s\\S]*/api/management/v1/principals/\\$BOOTSTRAP_PRINCIPAL/principal-roles"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "PR_ASSIGN_CODE"

  - it: should tolerate duplicate grant record 500 during principal role assignment to bootstrap principal
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'PR_ASSIGN_CODE" = "500" ] && is_duplicate_grant_record_error'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'sql-state ''23505'''

  # --- T3: Configurability ---
  - it: should propagate custom catalogRole name
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: my_custom_role
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "my_custom_role"

  - it: should propagate custom principalRole
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: service_admin
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'PRINCIPAL_ROLE="service_admin"'

  # --- T3: Boundary conditions ---
  - it: should render no grant PUT calls with empty privileges list
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges: []
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      # Role creation and assignment still happen
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "catalog-roles"
      # But no privilege grant calls
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "catalog-roles/.*/grants"

  - it: should use correct catalog name in grant API paths
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.catalogName: my-special-catalog
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      # POLARIS_CATALOG_NAME env var carries the Go template value (env[0])
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: POLARIS_CATALOG_NAME
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: my-special-catalog
      # Shell script aliases CATALOG_NAME from the env var
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'CATALOG_NAME="\$POLARIS_CATALOG_NAME"'

  # --- Input validation ---
  - it: should validate grant variable names against shell metacharacters
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "invalid characters"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "exit 42"

  - it: should validate privilege values against invalid characters
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      # Privilege validation block is rendered
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'case "CATALOG_MANAGE_CONTENT"'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "privilege contains invalid characters"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "privilege is empty"

  # --- Step counting ---
  - it: should count steps correctly when s3 disabled and grants enabled
    set:
      polaris.enabled: true
      polaris.bootstrap.enabled: true
      polaris.storage.s3.enabled: false
      polaris.bootstrap.grants.enabled: true
      polaris.bootstrap.grants.catalogRole: catalog_admin
      polaris.bootstrap.grants.principalRole: floe-pipeline
      polaris.bootstrap.grants.bootstrapPrincipal: root
      polaris.bootstrap.grants.privileges:
        - CATALOG_MANAGE_CONTENT
      polaris.auth.bootstrapCredentials.clientSecret: test-secret
    asserts:
      # Without S3 (3 base) + grants (5) = 8 total steps
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "Step 1/8:"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "Step 8/8:"
      # No step should exceed the total (overflow regression)
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "Step 9/8:"
