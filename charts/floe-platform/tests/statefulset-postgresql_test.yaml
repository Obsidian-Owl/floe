# PostgreSQL StatefulSet volume rendering tests (#137)
# Validates that persistence and initdb.scripts branches each produce
# a single volumes: block with the correct entries.
suite: postgresql statefulset volumes
templates:
  - templates/statefulset-postgresql.yaml
  - templates/secret-postgresql.yaml
tests:
  # -----------------------------------------------------------------
  # AC-1 / AC-5.1: persistence=false + initdb.scripts populated
  # -----------------------------------------------------------------
  - it: should render both data and init-scripts volumes when persistence=false
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.persistence.enabled: false
      postgresql.primary.initdb.scripts:
        init-databases.sql: "CREATE DATABASE dagster;"
    asserts:
      - isKind:
          of: StatefulSet
      # No volumeClaimTemplates when persistence is disabled
      - isNull:
          path: spec.volumeClaimTemplates
      # data volume uses emptyDir
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}
      # init-scripts volume references configMap
      - contains:
          path: spec.template.spec.volumes
          content:
            name: init-scripts
            configMap:
              name: floe-platform-postgresql-init
      # postgresql container mounts init-scripts
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
            mountPath: /docker-entrypoint-initdb.d

  # -----------------------------------------------------------------
  # AC-2 / AC-5.2: persistence=true + initdb.scripts populated (default)
  # -----------------------------------------------------------------
  - it: should render init-scripts volume and volumeClaimTemplates when persistence=true
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.persistence.enabled: true
      postgresql.primary.initdb.scripts:
        init-databases.sql: "CREATE DATABASE dagster;"
    asserts:
      - isKind:
          of: StatefulSet
      # volumeClaimTemplates has data PVC
      - exists:
          path: spec.volumeClaimTemplates[0].metadata.name
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      # init-scripts volume present
      - contains:
          path: spec.template.spec.volumes
          content:
            name: init-scripts
            configMap:
              name: floe-platform-postgresql-init
      # postgresql container mounts init-scripts
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
            mountPath: /docker-entrypoint-initdb.d

  # -----------------------------------------------------------------
  # AC-3 / AC-5.3: persistence=false + no initdb.scripts
  # -----------------------------------------------------------------
  - it: should render only data emptyDir volume when persistence=false and no initdb scripts
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.persistence.enabled: false
      postgresql.primary.initdb.scripts: null
    asserts:
      - isKind:
          of: StatefulSet
      - isNull:
          path: spec.volumeClaimTemplates
      # Only data volume, no init-scripts
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: init-scripts
          any: true
      # No init-scripts volumeMount on postgresql container
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
          any: true

  # -----------------------------------------------------------------
  # AC-1/AC-2/AC-9: volumeClaimTemplates labels must NOT include mutable values
  # -----------------------------------------------------------------
  - it: should NOT include mutable labels in volumeClaimTemplates
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.persistence.enabled: true
      postgresql.primary.initdb.scripts: null
    asserts:
      - isKind:
          of: StatefulSet
      - notExists:
          path: spec.volumeClaimTemplates[0].metadata.labels["helm.sh/chart"]
      - notExists:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/version"]
      - exists:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/instance"]
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.labels["app.kubernetes.io/part-of"]
          value: floe-platform

  # -----------------------------------------------------------------
  # AC-3: Non-PVC labels still use full floe-platform.labels
  # -----------------------------------------------------------------
  - it: should include full labels on StatefulSet metadata (not VCT)
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.persistence.enabled: true
      postgresql.primary.initdb.scripts: null
    asserts:
      - isKind:
          of: StatefulSet
      # StatefulSet metadata should still have helm.sh/chart
      - exists:
          path: metadata.labels["helm.sh/chart"]
      # Pod template should still have helm.sh/chart
      - exists:
          path: spec.template.metadata.labels["helm.sh/chart"]

  # -----------------------------------------------------------------
  # AC-2b / AC-5.4: persistence=true + no initdb.scripts
  # -----------------------------------------------------------------
  - it: should render only volumeClaimTemplates when persistence=true and no initdb scripts
    template: templates/statefulset-postgresql.yaml
    set:
      postgresql.primary.initdb.scripts: null
    asserts:
      - isKind:
          of: StatefulSet
      # volumeClaimTemplates has data PVC
      - exists:
          path: spec.volumeClaimTemplates[0].metadata.name
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      # No volumes block (only volumeClaimTemplates)
      - notExists:
          path: spec.template.spec.volumes
      # No init-scripts volumeMount on postgresql container
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
          any: true
